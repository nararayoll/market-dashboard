name: Update Dashboard

on:
  schedule:
    - cron: '0 23 * * 0-4'  # 매일 08:00 KST (월~금)
  workflow_dispatch:          # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write portfolio.json from secret
        run: echo '${{ secrets.PORTFOLIO_JSON }}' > portfolio.json

      - name: Run market_summary
        run: python market_summary.py

      - name: Run generate_dashboard
        run: python generate_dashboard.py

      - name: Commit and push
        run: |
          git config user.email "nararayoll@gmail.com"
          git config user.name "nararayoll"
          git add index.html market_data.csv
          git diff --staged --quiet || git commit -m "Update dashboard $(date +%Y-%m-%d)"
          git push
